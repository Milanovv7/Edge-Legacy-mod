* {
  box-sizing: border-box;
}

.edge-browser {
  height: 100vh;
  width: 100vw;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
}

/* Light Theme */
.edge-browser.light {
  --titlebar-bg: #E6E6E6;
  --tab-active-bg: #F2F2F2;
  --tab-active-text: #000000;
  --tab-inactive-bg: transparent;
  --tab-inactive-text: #333333;
  --tab-hover-bg: #DCDCDC;
  --toolbar-bg: #F2F2F2;
  --address-bar-bg: #FFFFFF;
  --address-bar-border: #CCCCCC;
  --address-bar-focus-border: #0078D7;
  --ntp-bg: #FFFFFF;
  --button-hover: #D1D1D1;
  --bookmark-tile-bg: #F2F2F2;
  --bookmark-tile-hover: #E6E6E6;
  --accent: #0078D7;
  --text-primary: #000000;
  --text-secondary: #333333;
  --border-color: #CCCCCC;
}

/* Dark Theme */
.edge-browser.dark {
  --titlebar-bg: #000000;
  --tab-active-bg: #2B2B2B;
  --tab-active-text: #FFFFFF;
  --tab-inactive-bg: transparent;
  --tab-inactive-text: #999999;
  --tab-hover-bg: #1A1A1A;
  --toolbar-bg: #2B2B2B;
  --address-bar-bg: #000000;
  --address-bar-border: #666666;
  --address-bar-focus-border: #0078D7;
  --ntp-bg: #1F1F1F;
  --button-hover: #333333;
  --bookmark-tile-bg: #333333;
  --bookmark-tile-hover: #404040;
  --accent: #0078D7;
  --text-primary: #FFFFFF;
  --text-secondary: #AAAAAA;
  --border-color: #444444;
}

/* Title Bar */
.title-bar {
  height: 40px;
  background-color: var(--titlebar-bg);
  display: flex;
  align-items: flex-end;
  padding: 0 8px;
  -webkit-user-select: none;
          user-select: none;
}

/* Tabs Container */
.tabs-container {
  display: flex;
  align-items: flex-end;
  flex: 1 1;
  overflow-x: auto;
  overflow-y: hidden;
}

.tabs-container::-webkit-scrollbar {
  height: 4px;
}

.tabs-container::-webkit-scrollbar-thumb {
  background: var(--border-color);
}

/* Tab */
.tab {
  display: flex;
  align-items: center;
  height: 32px;
  min-width: 150px;
  max-width: 200px;
  padding: 0 12px;
  margin-right: 1px;
  background-color: var(--tab-inactive-bg);
  color: var(--tab-inactive-text);
  cursor: pointer;
  position: relative;
  transition: background-color 0.1s ease;
}

.tab:hover {
  background-color: var(--tab-hover-bg);
}

.tab.active {
  background-color: var(--tab-active-bg);
  color: var(--tab-active-text);
}

.tab-title {
  flex: 1 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 12px;
}

.tab-close {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.1s ease;
}

.tab:hover .tab-close {
  opacity: 1;
}

.tab-close:hover {
  background-color: var(--button-hover);
}

/* New Tab Button */
.new-tab-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-secondary);
}

.new-tab-btn:hover {
  background-color: var(--tab-hover-bg);
}

/* Toolbar */
.toolbar {
  height: 48px;
  background-color: var(--toolbar-bg);
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 4px;
  border-bottom: 1px solid var(--border-color);
}

/* Toolbar Button */
.toolbar-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-primary);
  background: transparent;
  border: none;
  transition: background-color 0.1s ease;
}

.toolbar-btn:hover {
  background-color: var(--button-hover);
}

.toolbar-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.toolbar-btn:disabled:hover {
  background-color: transparent;
}

/* Address Bar */
.address-bar {
  flex: 1 1;
  height: 32px;
  display: flex;
  align-items: center;
  background-color: var(--address-bar-bg);
  border: 1px solid var(--address-bar-border);
  padding: 0 8px;
  margin: 0 8px;
  transition: border-color 0.1s ease;
}

.address-bar:focus-within {
  border-color: var(--address-bar-focus-border);
}

.address-bar input {
  flex: 1 1;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'Segoe UI', sans-serif;
}

.address-bar input::placeholder {
  color: var(--text-secondary);
}

.bookmark-btn {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-secondary);
}

.bookmark-btn:hover {
  color: var(--accent);
}

.bookmark-btn.bookmarked {
  color: var(--accent);
}

/* Content Area */
.content-area {
  flex: 1 1;
  background-color: var(--ntp-bg);
  overflow: hidden;
  position: relative;
}

.browser-iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* New Tab Page */
.new-tab-page {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 15vh;
  background-color: var(--ntp-bg);
  overflow-y: auto;
}

.ntp-search-container {
  width: 100%;
  max-width: 600px;
  padding: 0 24px;
  margin-bottom: 48px;
}

.ntp-title {
  font-size: 28px;
  font-weight: 300;
  color: var(--text-primary);
  margin-bottom: 24px;
  text-align: center;
}

.ntp-search-bar {
  width: 100%;
  height: 44px;
  padding: 0 16px;
  font-size: 16px;
  border: 2px solid var(--border-color);
  background-color: var(--address-bar-bg);
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.1s ease;
}

.ntp-search-bar:focus {
  border-color: var(--accent);
}

.ntp-search-bar::placeholder {
  color: var(--text-secondary);
}

/* Bookmarks Grid */
.bookmarks-section {
  width: 100%;
  max-width: 800px;
  padding: 0 24px;
}

.bookmarks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 16px;
  max-width: 600px;
  margin: 0 auto;
}

.bookmark-tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 8px;
  cursor: pointer;
  background-color: var(--bookmark-tile-bg);
  transition: background-color 0.1s ease;
}

.bookmark-tile:hover {
  background-color: var(--bookmark-tile-hover);
}

.bookmark-icon {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: var(--accent);
  color: white;
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.bookmark-icon img {
  width: 32px;
  height: 32px;
  object-fit: contain;
}

.bookmark-title {
  font-size: 12px;
  color: var(--text-primary);
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
}

/* Settings Flyout */
.settings-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: rgba(0, 0, 0, 0.3);
  z-index: 100;
}

.settings-flyout {
  position: fixed;
  top: 0;
  right: 0;
  width: 320px;
  height: 100%;
  background-color: var(--toolbar-bg);
  border-left: 1px solid var(--border-color);
  z-index: 101;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.settings-header {
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid var(--border-color);
}

.settings-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}

.settings-close {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-primary);
}

.settings-close:hover {
  background-color: var(--button-hover);
}

.settings-content {
  flex: 1 1;
  padding: 16px;
  overflow-y: auto;
}

.settings-section {
  margin-bottom: 24px;
}

.settings-section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
}

.theme-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.theme-option {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  cursor: pointer;
  background-color: var(--bookmark-tile-bg);
  color: var(--text-primary);
  font-size: 14px;
}

.theme-option:hover {
  background-color: var(--bookmark-tile-hover);
}

.theme-option.active {
  background-color: var(--accent);
  color: white;
}

.bookmark-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.bookmark-item {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  background-color: var(--bookmark-tile-bg);
}

.bookmark-item-info {
  flex: 1 1;
  overflow: hidden;
}

.bookmark-item-title {
  font-size: 13px;
  color: var(--text-primary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bookmark-item-url {
  font-size: 11px;
  color: var(--text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bookmark-delete {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-secondary);
}

.bookmark-delete:hover {
  color: #d32f2f;
  background-color: var(--button-hover);
}

.no-bookmarks {
  font-size: 13px;
  color: var(--text-secondary);
  text-align: center;
  padding: 16px;
}
